spring.application.name=smart-campus-request-router

# RabbitMQ usa puertos diferentes para no chocar con el proyecto capstone.
# RabbitMQ interno sigue en 5672, pero desde la PC se accede por 5678.
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5678
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

camel.springboot.main-run-controller=true

logging.level.org.apache.camel=INFO
logging.level.ec.udla.integracion.campus=INFO
